<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloco - NFXBlockChain Explorer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="dark-mode">
  <header class="main-header">
    <nav class="navbar">
      <div class="logo">🔷 NFXBlockChain</div>
      <ul class="nav-menu">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/nft-collections.html" class="nav-link">NFTs</a></li>
        <li><a href="/tokens.html" class="nav-link">Tokens</a></li>
        <li><a href="/islands.html" class="nav-link">Ilhas</a></li>
        <li><a href="/hypernodes.html" class="nav-link">Hypernodes</a></li>
        <li><a href="/ai.html" class="nav-link">AI Protection</a></li>
        <li><a href="/peers.html" class="nav-link">Peers</a></li>
      </ul>
      <div class="nav-actions">
        <button id="themeToggle" class="theme-btn" title="Trocar tema">🌙</button>
        <select id="networkSelector" class="network-select" style="display:none;">
          <option value="mainnet">MAINNET</option>
          <option value="testnet">TESTNET</option>
        </select>
      </div>
    </nav>
  </header>

  <main class="container">
    <div id="content"><div class="loading">Carregando bloco...</div></div>
  </main>

  <footer class="main-footer">
    <div class="footer-content">
      <div>© 2026 NFXBlockChain Explorer</div>
      <div id="connectionStats" class="connection-stats">Conexões: --</div>
    </div>
  </footer>

  <script>
    let currentNetwork = localStorage.getItem('nfxNetwork') || 'mainnet';
    let darkMode = localStorage.getItem('nfxDarkMode') !== 'false';
    const hash = new URLSearchParams(location.search).get('hash');
    
    function initTheme() {
      document.body.className = darkMode ? 'dark-mode' : 'light-mode';
      document.querySelector('.main-header').className = `main-header ${darkMode ? '' : 'light-mode'}`;
      document.querySelector('.main-footer').className = `main-footer ${darkMode ? '' : 'light-mode'}`;
      document.getElementById('themeToggle').textContent = darkMode ? '🌙' : '☀️';
    }
    
    function toggleTheme() {
      darkMode = !darkMode;
      localStorage.setItem('nfxDarkMode', darkMode);
      initTheme();
    }
    
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    
    async function checkNetworks() {
      try {
        const res = await fetch('/api/networks');
        const networks = await res.json();
        if (networks.length > 1) {
          document.getElementById('networkSelector').style.display = 'block';
          document.getElementById('networkSelector').value = currentNetwork;
        }
      } catch(e) {}
    }
    
    document.getElementById('networkSelector').addEventListener('change', (e) => {
      currentNetwork = e.target.value;
      localStorage.setItem('nfxNetwork', currentNetwork);
    });
    
    if (hash) {
      fetch(`/api/block/${currentNetwork}/${hash}`)
        .then(r => r.json())
        .then(renderBlock)
        .catch(err => {
          document.getElementById('content').innerHTML = '<div class="error">Erro: ' + err.message + '</div>';
        });
    }
    
    function renderBlock(block) {
      document.getElementById('content').innerHTML = `
        <h2 style="color: #00d4ff; margin: 20px 0;">Bloco #${block.height || 'Desconhecido'}</h2>
        <div class="block-details">
          <p><strong>Hash:</strong> <span style="color: #fff;">${block.hash}</span></p>
          <p><strong>Anterior:</strong> <span style="color: #fff;">${block.previousblockhash || 'Genesis'}</span></p>
          <p><strong>Merkle:</strong> <span style="color: #fff;">${block.merkleroot}</span></p>
          <p><strong>Tempo:</strong> <span style="color: #fff;">${new Date((block.time || 0) * 1000).toLocaleString()}</span></p>
          <p><strong>Bits:</strong> <span style="color: #fff;">${block.bits || 'N/A'}</span></p>
          <p><strong>Nonce:</strong> <span style="color: #fff;">${block.nonce || 'N/A'}</span></p>
          <p><strong>Tamanho:</strong> <span style="color: #fff;">${block.size || 0} bytes</span></p>
          <p><strong>Transações:</strong> <span style="color: #fff;">${block.tx ? block.tx.length : 0}</span></p>
          <details style="margin-top: 20px;">
            <summary style="color: #00d4ff; cursor: pointer;">Ver transações (${block.tx ? block.tx.length : 0})</summary>
            ${block.tx ? block.tx.map((t, i) => `<div style="padding: 10px; border-bottom: 1px solid #333;"><a href="/tx.html?network=${currentNetwork}&txid=${t}" style="color: #00d4ff;">${i+1}. ${t.slice(0, 20)}...</a></div>`).join('') : ''}
          </details>
        </div>
      `;
    }
    
    window.onload = () => { checkNetworks(); initTheme(); };
  </script>
</body>
</html>
