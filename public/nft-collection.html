<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFT Collection - NFXBlockChain Explorer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="dark-mode">
  <header class="main-header">
    <nav class="navbar">
      <div class="logo">🔷 NFXBlockChain</div>
      <ul class="nav-menu">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/nft-collections.html" class="nav-link active">NFTs</a></li>
        <li><a href="/tokens.html" class="nav-link">Tokens</a></li>
        <li><a href="/islands.html" class="nav-link">Ilhas</a></li>
        <li><a href="/hypernodes.html" class="nav-link">Hypernodes</a></li>
        <li><a href="/ai.html" class="nav-link">AI Protection</a></li>
        <li><a href="/peers.html" class="nav-link">Peers</a></li>
      </ul>
      <div class="nav-actions">
        <button id="themeToggle" class="theme-btn" title="Trocar tema">🌙</button>
        <select id="networkSelector" class="network-select" style="display:none;">
          <option value="mainnet">MAINNET</option>
          <option value="testnet">TESTNET</option>
        </select>
      </div>
    </nav>
  </header>

  <main class="container">
    <h1 id="collectionTitle">📦 Collection</h1>
    
    <div class="info-card" id="collectionInfo">
      <div class="loading">Carregando...</div>
    </div>
    
    <h3 style="color: #00d4ff; margin: 20px 0;">Tokens</h3>
    <div id="tokens">
      <div class="loading">Carregando tokens...</div>
    </div>
  </main>

  <footer class="main-footer">
    <div class="footer-content">
      <div>© 2026 NFXBlockChain Explorer</div>
      <div id="connectionStats" class="connection-stats">Conexões: --</div>
    </div>
  </footer>

  <script>
    let currentNetwork = localStorage.getItem('nfxNetwork') || 'mainnet';
    let darkMode = localStorage.getItem('nfxDarkMode') !== 'false';
    const id = new URLSearchParams(location.search).get('id');
    
    function initTheme() {
      document.body.className = darkMode ? 'dark-mode' : 'light-mode';
      document.querySelector('.main-header').className = `main-header ${darkMode ? '' : 'light-mode'}`;
      document.querySelector('.main-footer').className = `main-footer ${darkMode ? '' : 'light-mode'}`;
      document.getElementById('themeToggle').textContent = darkMode ? '🌙' : '☀️';
    }
    
    function toggleTheme() {
      darkMode = !darkMode;
      localStorage.setItem('nfxDarkMode', darkMode);
      initTheme();
    }
    
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    
    async function checkNetworks() {
      try {
        const res = await fetch('/api/networks');
        const networks = await res.json();
        if (networks.length > 1) {
          document.getElementById('networkSelector').style.display = 'block';
          document.getElementById('networkSelector').value = currentNetwork;
        }
      } catch(e) {}
    }
    
    document.getElementById('networkSelector').addEventListener('change', (e) => {
      currentNetwork = e.target.value;
      localStorage.setItem('nfxNetwork', currentNetwork);
    });
    
    async function loadCollection() {
      try {
        const res = await fetch(`/api/nft/collection/${currentNetwork}/${id}`);
        const data = await res.json();
        
        document.getElementById('collectionTitle').textContent = data.info?.name || `Collection #${id}`;
        document.getElementById('collectionInfo').innerHTML = `
          <p><span class="label">ID:</span> <span class="value">${id}</span></p>
          <p><span class="label">Símbolo:</span> <span class="value">${data.info?.symbol || 'N/A'}</span></p>
          <p><span class="label">Total Supply:</span> <span class="value">${data.info?.total_supply || 0}</span></p>
        `;
        
        document.getElementById('tokens').innerHTML = data.tokens?.map((t, i) => `
          <div class="block-item" onclick="viewToken('${id}', '${t.token_id || i}')">
            <div>
              <div class="block-height">Token #${t.token_id || i}</div>
            </div>
          </div>
        `).join('') || '<p style="color: #888;">Nenhum token encontrado</p>';
      } catch (err) {
        document.getElementById('collectionInfo').innerHTML = '<div class="error">Erro: ' + err.message + '</div>';
      }
    }
    
    function viewToken(collection, tokenId) {
      window.location.href = `/nft-token.html?network=${currentNetwork}&collection=${collection}&tokenId=${tokenId}`;
    }
    
    window.onload = () => { checkNetworks(); loadCollection(); initTheme(); };
  </script>
</body>
</html>
