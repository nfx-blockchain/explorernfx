<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transação - NFXBlockChain Explorer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="dark-mode">
  <header class="main-header">
    <nav class="navbar">
      <div class="logo">🔷 NFXBlockChain</div>
      <ul class="nav-menu">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/nft-collections.html" class="nav-link">NFTs</a></li>
        <li><a href="/tokens.html" class="nav-link">Tokens</a></li>
        <li><a href="/islands.html" class="nav-link">Ilhas</a></li>
        <li><a href="/hypernodes.html" class="nav-link">Hypernodes</a></li>
        <li><a href="/ai.html" class="nav-link">AI Protection</a></li>
        <li><a href="/peers.html" class="nav-link">Peers</a></li>
      </ul>
      <div class="nav-actions">
        <button id="themeToggle" class="theme-btn" title="Trocar tema">🌙</button>
        <select id="networkSelector" class="network-select" style="display:none;">
          <option value="mainnet">MAINNET</option>
          <option value="testnet">TESTNET</option>
        </select>
      </div>
    </nav>
  </header>

  <main class="container">
    <div id="content"><div class="loading">Carregando transação...</div></div>
  </main>

  <footer class="main-footer">
    <div class="footer-content">
      <div>© 2026 NFXBlockChain Explorer</div>
      <div id="connectionStats" class="connection-stats">Conexões: --</div>
    </div>
  </footer>

  <script>
    let currentNetwork = localStorage.getItem('nfxNetwork') || 'mainnet';
    let darkMode = localStorage.getItem('nfxDarkMode') !== 'false';
    const txid = new URLSearchParams(location.search).get('txid');
    
    function initTheme() {
      document.body.className = darkMode ? 'dark-mode' : 'light-mode';
      document.querySelector('.main-header').className = `main-header ${darkMode ? '' : 'light-mode'}`;
      document.querySelector('.main-footer').className = `main-footer ${darkMode ? '' : 'light-mode'}`;
      document.getElementById('themeToggle').textContent = darkMode ? '🌙' : '☀️';
    }
    
    function toggleTheme() {
      darkMode = !darkMode;
      localStorage.setItem('nfxDarkMode', darkMode);
      initTheme();
    }
    
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    
    async function checkNetworks() {
      try {
        const res = await fetch('/api/networks');
        const networks = await res.json();
        if (networks.length > 1) {
          document.getElementById('networkSelector').style.display = 'block';
          document.getElementById('networkSelector').value = currentNetwork;
        }
      } catch(e) {}
    }
    
    document.getElementById('networkSelector').addEventListener('change', (e) => {
      currentNetwork = e.target.value;
      localStorage.setItem('nfxNetwork', currentNetwork);
    });
    
    if (txid) {
      fetch(`/api/tx/${currentNetwork}/${txid}`)
        .then(r => r.json())
        .then(renderTx)
        .catch(err => {
          document.getElementById('content').innerHTML = '<div class="error">Erro: ' + err.message + '</div>';
        });
    }
    
    function renderTx(tx) {
      document.getElementById('content').innerHTML = `
        <h2 style="color: #00d4ff; margin: 20px 0;">Transação</h2>
        <div class="block-details">
          <p><strong>TXID:</strong> <span style="color: #fff;">${tx.txid}</span></p>
          <p><strong>Versão:</strong> <span style="color: #fff;">${tx.version}</span></p>
          <p><strong>Locktime:</strong> <span style="color: #fff;">${tx.locktime || 0}</span></p>
          <p><strong>Tamanho:</strong> <span style="color: #fff;">${tx.size || 'N/A'} bytes</span></p>
          <h3 style="color: #00d4ff; margin-top: 20px;">Entradas (${tx.vin ? tx.vin.length : 0})</h3>
          ${tx.vin ? tx.vin.map((v, i) => `
            <div style="padding: 10px; background: #1a1a2a; margin: 5px 0; border-radius: 4px;">
              <span style="color: #888;">${i + 1}.</span> ${v.txid ? `<a href="/tx.html?network=${currentNetwork}&txid=${v.txid}" style="color: #00d4ff;">${v.txid.slice(0, 20)}...</a>` : 'Coinbase'}
              <span style="color: #888;">(vout: ${v.vout}, seq: ${v.sequence})</span>
            </div>
          `).join('') : ''}
          <h3 style="color: #00d4ff; margin-top: 20px;">Saídas (${tx.vout ? tx.vout.length : 0})</h3>
          ${tx.vout ? tx.vout.map((v, i) => `
            <div style="padding: 10px; background: #1a1a2a; margin: 5px 0; border-radius: 4px;">
              <span style="color: #888;">${i + 1}.</span> ${v.scriptPubKey && v.scriptPubKey.addresses ? `<span style="color: #00d4ff;">${v.scriptPubKey.addresses[0]}</span>` : v.scriptPubKey ? `<span style="color: #00d4ff;">${v.scriptPubKey.asm ? v.scriptPubKey.asm.slice(0, 30) + '...' : 'N/A'}</span>` : 'N/A'}
              <span style="color: #fff; float: right;">${v.value} NFX</span>
            </div>
          `).join('') : ''}
        </div>
      `;
    }
    
    window.onload = () => { checkNetworks(); initTheme(); };
  </script>
</body>
</html>
