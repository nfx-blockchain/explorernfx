<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFXBlockChain Explorer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="dark-mode">
  <header class="main-header">
    <nav class="navbar">
      <div class="logo">🔷 NFXBlockChain</div>
      <ul class="nav-menu">
        <li><a href="/" class="nav-link active">Home</a></li>
        <li><a href="/nft-collections.html" class="nav-link">NFTs</a></li>
        <li><a href="/tokens.html" class="nav-link">Tokens</a></li>
        <li><a href="/islands.html" class="nav-link">Islands</a></li>
        <li><a href="/hypernodes.html" class="nav-link">Hypernodes</a></li>
        <li><a href="/ai.html" class="nav-link">AI Protection</a></li>
        <li><a href="/peers.html" class="nav-link">Peers</a></li>
      </ul>
      <div class="nav-actions">
        <button id="themeToggle" class="theme-btn" title="Toggle theme">🌙</button>
        <select id="networkSelector" class="network-select" style="display:none;">
          <option value="mainnet">MAINNET</option>
          <option value="testnet">TESTNET</option>
        </select>
      </div>
    </nav>
  </header>

  <main class="container">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search address, txid (64 chars), or block hash...">
      <button onclick="search()">Search</button>
    </div>
    
    <div class="stats" id="stats">
      <div class="loading">Loading...</div>
    </div>
    
    <div class="info-grid">
      <div class="info-card" id="nodeInfo">
        <h3>📡 Node Info</h3>
        <div class="loading">Loading...</div>
      </div>
      <div class="info-card" id="stakingInfo">
        <h3>💰 Staking Info</h3>
        <div class="loading">Loading...</div>
      </div>
    </div>
    
    <h3 style="color: #00d4ff; margin: 20px 0;">📦 Recent Blocks</h3>
    <div class="blocks-list" id="blocks">
      <div class="loading">Loading blocks...</div>
    </div>
  </main>

  <footer class="main-footer">
    <div class="footer-content">
      <div>© 2026 NFXBlockChain Explorer</div>
      <div id="connectionStats" class="connection-stats">Connections: --</div>
    </div>
  </footer>

  <script>
    let currentNetwork = localStorage.getItem('nfxNetwork') || 'mainnet';
    let darkMode = localStorage.getItem('nfxDarkMode') !== 'false';
    
    function initTheme() {
      document.body.className = darkMode ? 'dark-mode' : 'light-mode';
      document.querySelector('.main-header').className = `main-header ${darkMode ? '' : 'light-mode'}`;
      document.querySelector('.main-footer').className = `main-footer ${darkMode ? '' : 'light-mode'}`;
      document.getElementById('themeToggle').textContent = darkMode ? '🌙' : '☀️';
    }
    
    function toggleTheme() {
      darkMode = !darkMode;
      localStorage.setItem('nfxDarkMode', darkMode);
      initTheme();
    }
    
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    
    async function checkNetworks() {
      try {
        const res = await fetch('/api/networks');
        const networks = await res.json();
        if (networks.length > 1) {
          document.getElementById('networkSelector').style.display = 'block';
          document.getElementById('networkSelector').value = currentNetwork;
        }
      } catch(e) {}
    }
    
    document.getElementById('networkSelector').addEventListener('change', (e) => {
      currentNetwork = e.target.value;
      localStorage.setItem('nfxNetwork', currentNetwork);
      loadInfo();
      loadBlocks();
    });
    
    async function loadInfo() {
      try {
        const res = await fetch(`/api/info/${currentNetwork}`);
        const data = await res.json();
        
        document.getElementById('stats').innerHTML = `
          <div class="stat-card"><h3>Blocks</h3><div class="value">${data.blocks}</div></div>
          <div class="stat-card"><h3>Connections</h3><div class="value">${data.connections}</div></div>
          <div class="stat-card"><h3>Balance</h3><div class="value">${data.balance || 0}</div></div>
          <div class="stat-card"><h3>PoW Diff</h3><div class="value">${data.difficulty?.["proof-of-work"] || 0}</div></div>
          <div class="stat-card"><h3>PoS Diff</h3><div class="value">${data.difficulty?.["proof-of-stake"] || 0}</div></div>
          <div class="stat-card"><h3>AI Confidence</h3><div class="value">${data.ai_confidence || 0}%</div></div>
        `;
        
        document.getElementById('nodeInfo').innerHTML = `
          <p><span class="label">Version:</span> <span class="value">${data.version}</span></p>
          <p><span class="label">Protocol:</span> <span class="value">${data.protocolversion}</span></p>
          <p><span class="label">IP:</span> <span class="value">${data.ip || 'N/A'}</span></p>
          <p><span class="label">Supply:</span> <span class="value">${data.moneysupply || 0}</span></p>
          <p><span class="label">AI Health:</span> <span class="value">${data.ai_health || 'N/A'}</span></p>
        `;
        
        if (data.staking) {
          document.getElementById('stakingInfo').innerHTML = `
            <p><span class="label">Enabled:</span> <span class="value">${data.staking.enabled ? 'Yes' : 'No'}</span></p>
            <p><span class="label">Staking:</span> <span class="value">${data.staking.staking ? 'Active' : 'Inactive'}</span></p>
            <p><span class="label">Difficulty:</span> <span class="value">${data.staking.difficulty || 0}</span></p>
            <p><span class="label">Net Weight:</span> <span class="value">${data.staking.netstakeweight || 0}</span></p>
            <p><span class="label">Pooled TX:</span> <span class="value">${data.staking.pooledtx || 0}</span></p>
          `;
        }
        
        document.getElementById('connectionStats').textContent = `Connections: ${data.connections || 0}`;
      } catch (err) {
        document.getElementById('stats').innerHTML = '<div class="error">Error: ' + err.message + '</div>';
      }
    }
    
    async function loadBlocks() {
      try {
        const res = await fetch(`/api/blocks/${currentNetwork}/100`);
        const blocks = await res.json();
        document.getElementById('blocks').innerHTML = blocks.slice(-20).reverse().map(b => `
          <div class="block-item" onclick="viewBlock('${b.hash}')">
            <div>
              <div class="block-height">Block #${b.height}</div>
              <div class="block-info">${b.txCount} TX • ${new Date(b.time * 1000).toLocaleString()} • ${b.size} bytes</div>
            </div>
            <div style="font-size: 11px; color: #666;" title="${b.hash}">${b.hash.slice(0, 20)}...</div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('blocks').innerHTML = '<div class="error">Error loading blocks</div>';
      }
    }
    
    function search() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      
      if (query.length === 64) {
        if (query.startsWith('0000') || query.startsWith('00000')) {
          viewBlock(query);
        } else {
          viewTx(query);
        }
      } else if (query.match(/^[a-zA-Z0-9]{20,}$/)) {
        viewAddress(query);
      }
    }
    
    function viewBlock(hash) {
      window.location.href = `/block.html?network=${currentNetwork}&hash=${hash}`;
    }
    
    function viewTx(txid) {
      window.location.href = `/tx.html?network=${currentNetwork}&txid=${txid}`;
    }
    
    function viewAddress(address) {
      window.location.href = `/address.html?network=${currentNetwork}&address=${address}`;
    }
    
    window.onload = () => { checkNetworks(); loadInfo(); loadBlocks(); initTheme(); };
  </script>
</body>
</html>
