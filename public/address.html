<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Address - NFXBlockChain Explorer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="dark-mode">
  <header class="main-header">
    <nav class="navbar">
      <div class="logo">🔷 NFXBlockChain</div>
      <ul class="nav-menu">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/nft-collections.html" class="nav-link">NFTs</a></li>
        <li><a href="/tokens.html" class="nav-link">Tokens</a></li>
        <li><a href="/islands.html" class="nav-link">Islands</a></li>
        <li><a href="/hypernodes.html" class="nav-link">Hypernodes</a></li>
        <li><a href="/ai.html" class="nav-link">AI Protection</a></li>
        <li><a href="/peers.html" class="nav-link">Peers</a></li>
      </ul>
      <div class="nav-actions">
        <button id="themeToggle" class="theme-btn" title="Toggle theme">🌙</button>
        <select id="networkSelector" class="network-select" style="display:none;">
          <option value="mainnet">MAINNET</option>
          <option value="testnet">TESTNET</option>
        </select>
      </div>
    </nav>
  </header>

  <main class="container">
    <div id="content"><div class="loading">Loading...</div></div>
  </main>

  <footer class="main-footer">
    <div class="footer-content">
      <div>© 2026 NFXBlockChain Explorer</div>
      <div id="connectionStats" class="connection-stats">Connections: --</div>
    </div>
  </footer>

  <script>
    let currentNetwork = localStorage.getItem('nfxNetwork') || 'mainnet';
    let darkMode = localStorage.getItem('nfxDarkMode') !== 'false';
    const address = new URLSearchParams(location.search).get('address');
    
    function initTheme() {
      document.body.className = darkMode ? 'dark-mode' : 'light-mode';
      document.querySelector('.main-header').className = `main-header ${darkMode ? '' : 'light-mode'}`;
      document.querySelector('.main-footer').className = `main-footer ${darkMode ? '' : 'light-mode'}`;
      document.getElementById('themeToggle').textContent = darkMode ? '🌙' : '☀️';
    }
    
    function toggleTheme() {
      darkMode = !darkMode;
      localStorage.setItem('nfxDarkMode', darkMode);
      initTheme();
    }
    
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    
    async function checkNetworks() {
      try {
        const res = await fetch('/api/networks');
        const networks = await res.json();
        if (networks.length > 1) {
          document.getElementById('networkSelector').style.display = 'block';
          document.getElementById('networkSelector').value = currentNetwork;
        }
      } catch(e) {}
    }
    
    document.getElementById('networkSelector').addEventListener('change', (e) => {
      currentNetwork = e.target.value;
      localStorage.setItem('nfxNetwork', currentNetwork);
    });
    
    if (address) {
      fetch(`/api/address/${currentNetwork}/${address}`)
        .then(r => r.json())
        .then(renderAddress)
        .catch(err => {
          document.getElementById('content').innerHTML = '<div class="error">Error: ' + err.message + '</div>';
        });
    }
    
    function renderAddress(data) {
      const val = data.validated || {};
      document.getElementById('content').innerHTML = `
        <h2 style="color: #00d4ff; margin: 20px 0;">Address</h2>
        <div class="block-details">
          <p><strong>Address:</strong> <span style="color: #fff;">${data.address}</span></p>
          <p><strong>Valid:</strong> <span style="color: #fff;">${val.isvalid ? 'Yes' : 'No'}</span></p>
          <p><strong>Is Miner:</strong> <span style="color: #fff;">${val.ismine ? 'Yes' : 'No'}</span></p>
          <p><strong>Transactions:</strong> <span style="color: #fff;">${data.transactions ? data.transactions.length : 0}</span></p>
          ${data.transactions && data.transactions.length > 0 ? `
            <h3 style="color: #00d4ff; margin-top: 20px;">Recent Transactions</h3>
            ${data.transactions.map(tx => `
              <div style="padding: 10px; border-bottom: 1px solid #333;">
                <a href="/tx.html?network=${currentNetwork}&txid=${tx.txid}" style="color: #00d4ff;">${tx.txid.slice(0, 20)}...</a>
                <span style="color: #888; font-size: 12px;">${tx.category} • ${tx.amount} NFX</span>
              </div>
            `).join('')}
          ` : ''}
        </div>
      `;
    }
    
    window.onload = () => { checkNetworks(); initTheme(); };
  </script>
</body>
</html>
