<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFT Collections - NFXBlockChain Explorer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="dark-mode">
  <header class="main-header">
    <nav class="navbar">
      <div class="logo">🔷 NFXBlockChain</div>
      <ul class="nav-menu">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/nft-collections.html" class="nav-link active">NFTs</a></li>
        <li><a href="/tokens.html" class="nav-link">Tokens</a></li>
        <li><a href="/islands.html" class="nav-link">Ilhas</a></li>
        <li><a href="/hypernodes.html" class="nav-link">Hypernodes</a></li>
        <li><a href="/ai.html" class="nav-link">AI Protection</a></li>
        <li><a href="/peers.html" class="nav-link">Peers</a></li>
      </ul>
      <div class="nav-actions">
        <button id="themeToggle" class="theme-btn" title="Trocar tema">🌙</button>
        <select id="networkSelector" class="network-select" style="display:none;">
          <option value="mainnet">MAINNET</option>
          <option value="testnet">TESTNET</option>
        </select>
      </div>
    </nav>
  </header>

  <main class="container">
    <h1>🎨 NFT Collections</h1>
    
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar collection ID...">
      <button onclick="search()">Buscar</button>
    </div>
    
    <div id="collections">
      <div class="loading">Carregando coleções...</div>
    </div>
  </main>

  <footer class="main-footer">
    <div class="footer-content">
      <div>© 2026 NFXBlockChain Explorer</div>
      <div id="connectionStats" class="connection-stats">Conexões: --</div>
    </div>
  </footer>

  <script>
    let currentNetwork = localStorage.getItem('nfxNetwork') || 'mainnet';
    let darkMode = localStorage.getItem('nfxDarkMode') !== 'false';
    
    function initTheme() {
      document.body.className = darkMode ? 'dark-mode' : 'light-mode';
      document.querySelector('.main-header').className = `main-header ${darkMode ? '' : 'light-mode'}`;
      document.querySelector('.main-footer').className = `main-footer ${darkMode ? '' : 'light-mode'}`;
      document.getElementById('themeToggle').textContent = darkMode ? '🌙' : '☀️';
    }
    
    function toggleTheme() {
      darkMode = !darkMode;
      localStorage.setItem('nfxDarkMode', darkMode);
      initTheme();
    }
    
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    
    async function checkNetworks() {
      try {
        const res = await fetch('/api/networks');
        const networks = await res.json();
        if (networks.length > 1) {
          document.getElementById('networkSelector').style.display = 'block';
          document.getElementById('networkSelector').value = currentNetwork;
        }
      } catch(e) {}
    }
    
    document.getElementById('networkSelector').addEventListener('change', (e) => {
      currentNetwork = e.target.value;
      localStorage.setItem('nfxNetwork', currentNetwork);
    });
    
    async function loadCollections() {
      try {
        const res = await fetch(`/api/nft/${currentNetwork}/list`);
        const collections = await res.json();
        
        document.getElementById('collections').innerHTML = collections.map(c => `
          <div class="block-item" onclick="viewCollection('${c.collection_id || c}')">
            <div>
              <div class="block-height">${c.name || c.collection_id || c}</div>
              <div class="block-info">Símbolo: ${c.symbol || 'N/A'} • Supply: ${c.total_supply || 0}</div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('collections').innerHTML = '<div class="error">Erro: ' + err.message + '</div>';
      }
    }
    
    function search() {
      const query = document.getElementById('searchInput').value.trim();
      if (query) viewCollection(query);
    }
    
    function viewCollection(id) {
      window.location.href = `/nft-collection.html?network=${currentNetwork}&id=${id}`;
    }
    
    window.onload = () => { checkNetworks(); loadCollections(); initTheme(); };
  </script>
</body>
</html>
